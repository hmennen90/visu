name: Build Runtime (micro.sfx)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version'
        required: true
        default: '8.4'
        type: choice
        options:
          - '8.4'
          - '8.5'

jobs:
  build:
    name: micro.sfx / ${{ matrix.os }}-${{ matrix.arch }} / PHP ${{ inputs.php_version }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-14
          # macOS x86_64: no free Intel runners available (macos-13 retired)
          # Build locally or use macos-13-xlarge (paid) when needed
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: windows
            arch: x86_64
            runner: windows-latest

    steps:
      - name: Checkout static-php-cli
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          ref: main

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, mbstring, xml, tokenizer
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --ignore-platform-reqs

      # ── Unix builds (macOS + Linux) ──

      - name: Download sources (Unix)
        if: runner.os != 'Windows'
        run: |
          php bin/spc download \
            --with-php=${{ inputs.php_version }} \
            --for-extensions=glfw,mbstring,zip,phar \
            --prefer-pre-built

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules

      - name: Add GLFW Linux support to static-php-cli
        if: runner.os == 'Linux'
        run: |
          # Symlink X11 headers and libs into buildroot so the musl toolchain finds them
          mkdir -p buildroot/include buildroot/lib
          for dir in X11 GL; do
            [ -d "/usr/include/$dir" ] && ln -sf "/usr/include/$dir" "buildroot/include/$dir"
          done
          # Link X11-related headers that live directly in /usr/include
          for hdr in /usr/include/X11/*.h /usr/include/GL/*.h; do
            [ -f "$hdr" ] && ln -sf "$hdr" "buildroot/include/$(basename "$hdr")" 2>/dev/null || true
          done
          # Link X11 static libraries
          for lib in /usr/lib/x86_64-linux-gnu/libX*.a /usr/lib/aarch64-linux-gnu/libX*.a; do
            [ -f "$lib" ] && ln -sf "$lib" "buildroot/lib/$(basename "$lib")" 2>/dev/null || true
          done

          # Also copy pkg-config files for X11
          mkdir -p buildroot/lib/pkgconfig
          for pc in x11 xrandr xinerama xcursor xi xext xfixes xrender; do
            for pcfile in /usr/lib/*/pkgconfig/${pc}.pc; do
              [ -f "$pcfile" ] && cp "$pcfile" "buildroot/lib/pkgconfig/" 2>/dev/null || true
            done
          done

          # Create Linux GLFW library builder (mirrors the macOS version)
          cat > src/SPC/builder/linux/library/glfw.php << 'EOF'
          <?php
          declare(strict_types=1);
          namespace SPC\builder\linux\library;
          use SPC\util\executor\UnixCMakeExecutor;

          class glfw extends LinuxLibraryBase
          {
              public const NAME = 'glfw';

              protected function build(): void
              {
                  UnixCMakeExecutor::create($this)
                      ->setBuildDir("{$this->source_dir}/vendor/glfw")
                      ->setReset(false)
                      ->addConfigureArgs(
                          '-DGLFW_BUILD_EXAMPLES=OFF',
                          '-DGLFW_BUILD_TESTS=OFF',
                          '-DGLFW_BUILD_WAYLAND=OFF',
                      )
                      ->build('.');
                  $this->patchPkgconfPrefix(['glfw3.pc']);
              }
          }
          EOF
          # Fix heredoc indentation
          sed -i 's/^          //' src/SPC/builder/linux/library/glfw.php

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config

      - name: Check build environment (Unix)
        if: runner.os != 'Windows'
        run: php bin/spc doctor --auto-fix

      - name: Build micro.sfx (Unix)
        if: runner.os != 'Windows'
        run: php bin/spc build glfw,mbstring,zip,phar --build-micro

      # ── Windows build ──

      - name: Download sources (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          php bin/spc download `
            --with-php=${{ inputs.php_version }} `
            --for-extensions=glfw,mbstring,zip,phar `
            --prefer-pre-built

      - name: Setup Windows build environment
        if: runner.os == 'Windows'
        shell: powershell
        run: php bin/spc doctor --auto-fix

      - name: Build micro.sfx (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: php bin/spc build glfw,mbstring,zip,phar --build-micro

      # ── Upload ──

      - name: Upload micro.sfx
        uses: actions/upload-artifact@v4
        with:
          name: micro-${{ matrix.os }}-${{ matrix.arch }}
          path: buildroot/bin/micro.sfx
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          for dir in artifacts/micro-*/; do
            platform=$(basename "$dir")
            cp "$dir/micro.sfx" "release/${platform}.sfx"
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: runtime-php${{ inputs.php_version }}
          name: "VISU Runtime — PHP ${{ inputs.php_version }}"
          body: |
            ## VISU Runtime Binaries

            Static PHP micro.sfx binaries for VISU game distribution.

            **PHP Version:** ${{ inputs.php_version }}
            **Extensions:** glfw, mbstring, zip, phar

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | arm64 (Apple Silicon) | `micro-macos-arm64.sfx` |
            | Linux | x86_64 | `micro-linux-x86_64.sfx` |
            | Linux | arm64 | `micro-linux-arm64.sfx` |
            | Windows | x86_64 | `micro-windows-x86_64.sfx` |

            ### Usage

            These binaries are automatically downloaded by `visu build`.
            Manual: `cat micro-<platform>-<arch>.sfx game.phar > MyGame && chmod +x MyGame`
          files: release/*
          draft: false
          prerelease: false
