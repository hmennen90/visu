name: Build Runtime (micro.sfx)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP version'
        required: true
        default: '8.4'
        type: choice
        options:
          - '8.4'
          - '8.5'

jobs:
  build:
    name: micro.sfx / ${{ matrix.os }}-${{ matrix.arch }} / PHP ${{ inputs.php_version }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-14
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: windows
            arch: x86_64
            runner: windows-latest

    steps:
      - name: Checkout static-php-cli
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          ref: main

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, mbstring, xml, tokenizer
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --ignore-platform-reqs

      # ── Download sources ──

      - name: Download sources (Unix)
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          php bin/spc download \
            --with-php=${{ inputs.php_version }} \
            --for-extensions=glfw,mbstring,zip,phar \
            --prefer-pre-built

      - name: Download sources (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          php bin/spc download `
            --with-php=${{ inputs.php_version }} `
            --for-extensions=glfw,mbstring,zip,phar `
            --prefer-pre-built

      # ── Platform-specific build tools ──

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config

      # ── Patch static-php-cli for GLFW support ──
      # These patches add proper Linux support and fix macOS C++ linking.
      # TODO: submit as upstream PR to crazywhalecc/static-php-cli

      - name: Patch GLFW for Linux
        if: runner.os == 'Linux'
        run: |
          # 1. Enable Linux support in ext.json
          php -r '
            $f = "config/ext.json";
            $d = json_decode(file_get_contents($f), true);
            $d["glfw"]["support"]["Linux"] = "yes";
            file_put_contents($f, json_encode($d, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
          '

          # 2. Add Linux static libs to lib.json
          php -r '
            $f = "config/lib.json";
            $d = json_decode(file_get_contents($f), true);
            $d["glfw"]["static-libs-linux"] = ["libglfw3.a"];
            $d["glfw"]["headers"] = ["GLFW"];
            file_put_contents($f, json_encode($d, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
          '

          # 3. Symlink X11 headers and static libs into buildroot
          mkdir -p buildroot/include buildroot/lib buildroot/lib/pkgconfig
          ARCH=$(dpkg --print-architecture)
          if [ "$ARCH" = "amd64" ]; then LIBDIR="/usr/lib/x86_64-linux-gnu"; fi
          if [ "$ARCH" = "arm64" ]; then LIBDIR="/usr/lib/aarch64-linux-gnu"; fi

          for dir in X11 GL; do
            [ -d "/usr/include/$dir" ] && ln -sf "/usr/include/$dir" "buildroot/include/$dir"
          done
          for lib in libX11.a libXrandr.a libXinerama.a libXcursor.a libXi.a \
                     libXext.a libXfixes.a libXrender.a libxcb.a libXau.a libXdmcp.a; do
            [ -f "${LIBDIR}/${lib}" ] && ln -sf "${LIBDIR}/${lib}" "buildroot/lib/${lib}"
          done
          for pc in x11 xrandr xinerama xcursor xi xext xfixes xrender xcb xau xdmcp; do
            [ -f "${LIBDIR}/pkgconfig/${pc}.pc" ] && cp "${LIBDIR}/pkgconfig/${pc}.pc" buildroot/lib/pkgconfig/
          done

          # 4. Create Linux GLFW library builder class
          cat > src/SPC/builder/linux/library/glfw.php << 'LIBEOF'
          <?php
          declare(strict_types=1);
          namespace SPC\builder\linux\library;
          use SPC\util\executor\UnixCMakeExecutor;
          class glfw extends LinuxLibraryBase
          {
              public const NAME = 'glfw';
              protected function build(): void
              {
                  UnixCMakeExecutor::create($this)
                      ->setBuildDir("{$this->source_dir}/vendor/glfw")
                      ->setReset(false)
                      ->addConfigureArgs(
                          '-DGLFW_BUILD_EXAMPLES=OFF',
                          '-DGLFW_BUILD_TESTS=OFF',
                          '-DGLFW_BUILD_WAYLAND=OFF',
                      )
                      ->build('.');
                  $this->patchPkgconfPrefix(['glfw3.pc']);
              }
          }
          LIBEOF
          sed -i 's/^          //' src/SPC/builder/linux/library/glfw.php

      - name: Patch GLFW extension for C++ linking
        if: runner.os != 'Windows'
        run: |
          cat > src/SPC/builder/extension/glfw.php << 'EXTEOF'
          <?php
          declare(strict_types=1);
          namespace SPC\builder\extension;
          use SPC\builder\Extension;
          use SPC\store\FileSystem;
          use SPC\util\CustomExt;
          #[CustomExt('glfw')]
          class glfw extends Extension
          {
              public function patchBeforeBuildconf(): bool
              {
                  if (file_exists(SOURCE_PATH . '/php-src/ext/glfw')) { return false; }
                  FileSystem::copyDir(SOURCE_PATH . '/ext-glfw', SOURCE_PATH . '/php-src/ext/glfw');
                  return true;
              }
              public function patchBeforeConfigure(): bool
              {
                  FileSystem::replaceFileStr(SOURCE_PATH . '/php-src/configure', '-lglfw ', '-lglfw3 ');
                  if (PHP_OS_FAMILY === 'Darwin') {
                      FileSystem::replaceFileStr(
                          SOURCE_PATH . '/php-src/configure',
                          '-framework IOKit',
                          '-framework IOKit -lc++'
                      );
                  }
                  return true;
              }
              public function getUnixConfigureArg(bool $shared = false): string
              {
                  return '--enable-glfw --with-glfw-dir=' . BUILD_ROOT_PATH;
              }
              public function getWindowsConfigureArg(bool $shared = false): string
              {
                  return '--enable-glfw=static';
              }
          }
          EXTEOF
          sed -i.bak 's/^          //' src/SPC/builder/extension/glfw.php
          rm -f src/SPC/builder/extension/glfw.php.bak

      # ── Build ──

      - name: Doctor check (Unix)
        if: runner.os != 'Windows'
        run: php bin/spc doctor --auto-fix

      - name: Build micro.sfx (Unix)
        if: runner.os != 'Windows'
        run: php bin/spc build glfw,mbstring,zip,phar --build-micro --debug

      - name: Doctor check (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: php bin/spc doctor --auto-fix

      - name: Build micro.sfx (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: php bin/spc build glfw,mbstring,zip,phar --build-micro --debug

      # ── Upload ──

      - name: Upload micro.sfx
        uses: actions/upload-artifact@v4
        with:
          name: micro-${{ matrix.os }}-${{ matrix.arch }}
          path: buildroot/bin/micro.sfx
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          for dir in artifacts/micro-*/; do
            platform=$(basename "$dir")
            cp "$dir/micro.sfx" "release/${platform}.sfx"
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: runtime-php${{ inputs.php_version }}
          name: "VISU Runtime — PHP ${{ inputs.php_version }}"
          body: |
            ## VISU Runtime Binaries

            Static PHP micro.sfx binaries for VISU game distribution.

            **PHP Version:** ${{ inputs.php_version }}
            **Extensions:** glfw, mbstring, zip, phar

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | arm64 (Apple Silicon) | `micro-macos-arm64.sfx` |
            | Linux | x86_64 | `micro-linux-x86_64.sfx` |
            | Linux | arm64 | `micro-linux-arm64.sfx` |
            | Windows | x86_64 | `micro-windows-x86_64.sfx` |

            ### Usage

            These binaries are automatically downloaded by `visu build`.
            Manual: `cat micro-<platform>-<arch>.sfx game.phar > MyGame && chmod +x MyGame`
          files: release/*
          draft: false
          prerelease: false
