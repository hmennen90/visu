name: VISU CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  tests:
    name: PHP ${{ matrix.php }} — Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: :glfw, dom, curl, mbstring, xml, tokenizer
          coverage: none
          tools: phpunit:9.6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            php-dev build-essential cmake \
            libglfw3-dev xvfb \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Build PHP-GLFW
        run: |
          git clone https://github.com/mario-deluna/php-glfw
          cd php-glfw
          sudo phpize
          ./configure --enable-glfw
          make -j$(nproc)
          sudo make install
          cd ../
          echo 'extension=glfw.so' | sudo tee -a $(php -r "echo php_ini_loaded_file();")

      - name: Install Composer dependencies
        run: composer install --no-interaction

      - name: Run PHPUnit
        run: xvfb-run --auto-servernum phpunit

  static-analysis:
    name: PHPStan (Level 8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: :glfw, dom, curl, mbstring, xml, tokenizer
          coverage: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            php-dev build-essential cmake \
            libglfw3-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Build PHP-GLFW
        run: |
          git clone https://github.com/mario-deluna/php-glfw
          cd php-glfw
          sudo phpize
          ./configure --enable-glfw
          make -j$(nproc)
          sudo make install
          cd ../
          echo 'extension=glfw.so' | sudo tee -a $(php -r "echo php_ini_loaded_file();")

      - name: Install Composer dependencies
        run: composer install --no-interaction

      - name: Run PHPStan
        run: php vendor/bin/phpstan analyse src --error-format=github -l8
